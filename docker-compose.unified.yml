# docker-compose.unified.yml
# Profiles: dev / optimized / prod / prod-external
name: koiki_v07_unified

x-app-base: &app-base
  env_file:
    - ${ENV_FILE:-.env}
  environment:
    - UVICORN_WORKERS=${UVICORN_WORKERS:-4}
    - ENVIRONMENT=production
  ports:
    - "8000:8000"
  restart: unless-stopped
  healthcheck:
    test: [ "CMD", "curl", "-f", "http://localhost:8000/" ]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 5s
  networks:
    default:
      aliases:
        - app

x-frontend-base: &frontend-base
  env_file:
    - ./frontend/.env.docker
  environment:
    - API_UPSTREAM=http://app:8000
  ports:
    - "3000:3000"
  restart: unless-stopped
  healthcheck:
    test: [ "CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000/health" ]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 30s

services:
  app-dev:
    <<: *app-base
    profiles: [ "dev" ]
    container_name: koiki_v07_app_dev
    build:
      context: .
      dockerfile: Dockerfile.unified
      target: dev
    command: uvicorn apps.asgi:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_started
    volumes:
      - ./app:/app/app:cached
      - ./apps:/app/apps:cached
      - ./components:/app/components:cached
      - ./ops:/app/ops:cached

  app-optimized:
    <<: *app-base
    profiles: [ "optimized" ]
    container_name: koiki_v07_app_opt
    build:
      context: .
      dockerfile: Dockerfile.unified
      target: optimized
    command: uvicorn apps.asgi:app --host 0.0.0.0 --port 8000 --no-access-log
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_started

  app-prod:
    <<: *app-base
    profiles: [ "prod" ]
    container_name: koiki_v07_app_prod_unified
    env_file:
      - ${ENV_FILE:-.env.production}
    build:
      context: .
      dockerfile: Dockerfile.unified
      target: production
      args:
        INSTALL_MAIN_ONLY: "true"
    command: uvicorn apps.asgi:app --host 0.0.0.0 --port 8000 --no-access-log
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_started

  app-prod-external:
    <<: *app-base
    profiles: [ "prod-external" ]
    container_name: koiki_v07_app_prod_external_unified
    env_file:
      - ${ENV_FILE:-.env.production}
    build:
      context: .
      dockerfile: Dockerfile.unified
      target: production
      args:
        INSTALL_MAIN_ONLY: "true"
    command: uvicorn apps.asgi:app --host 0.0.0.0 --port 8000 --no-access-log
    depends_on: []

  frontend-dev:
    <<: *frontend-base
    profiles: [ "dev" ]
    container_name: koiki_v07_frontend_dev
    environment:
      - VITE_API_BASE_URL=/api/v1
      - VITE_API_PROXY_TARGET=http://app:8000
    build:
      context: ./frontend
      dockerfile: Dockerfile.unified
      target: dev
    command: npm run dev -- --host 0.0.0.0 --port 3000
    volumes:
      - ./frontend/src:/app/src:cached
      - ./frontend/public:/app/public:cached
      - /app/node_modules
    depends_on:
      app-dev:
        condition: service_started

  frontend-optimized:
    <<: *frontend-base
    profiles: [ "optimized" ]
    container_name: koiki_v07_frontend_opt
    build:
      context: ./frontend
      dockerfile: Dockerfile.unified
      target: runner
    depends_on:
      app-optimized:
        condition: service_started

  frontend-prod:
    <<: *frontend-base
    profiles: [ "prod" ]
    container_name: koiki_v07_frontend_prod_unified
    env_file:
      - ${FRONTEND_ENV_FILE:-./frontend/.env.production}
    build:
      context: ./frontend
      dockerfile: Dockerfile.unified
      target: runner
    depends_on:
      app-prod:
        condition: service_started

  frontend-prod-external:
    <<: *frontend-base
    profiles: [ "prod-external" ]
    container_name: koiki_v07_frontend_prod_external_unified
    env_file:
      - ${FRONTEND_ENV_FILE:-./frontend/.env.production}
    build:
      context: ./frontend
      dockerfile: Dockerfile.unified
      target: runner
    depends_on:
      app-prod-external:
        condition: service_started

  db:
    profiles: [ "dev", "optimized", "prod" ]
    image: postgres:15
    container_name: koiki_v07_postgres_unified
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ${ENV_FILE:-.env}
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    command:
      - "postgres"
      - "-c"
      - "max_connections=150"
      - "-c"
      - "shared_buffers=384MB"

  keycloak:
    profiles: [ "dev", "optimized", "prod" ]
    image: quay.io/keycloak/keycloak:26.3.5
    container_name: koiki_v07_keycloak_unified
    env_file:
      - ${ENV_FILE:-.env}
    volumes:
      - ./docker/keycloak/realm-koiki.json:/opt/keycloak/data/import/realm-koiki.json:ro
      - ./docker/keycloak/realm-saml.json:/opt/keycloak/data/import/realm-saml.json:ro
      - keycloak_data:/opt/keycloak/data
    ports:
      - "8090:8080"
      - "9000:9000"
    environment:
      KC_HTTP_ENABLED: true
      KC_HOSTNAME_STRICT: false
      KC_LOG_LEVEL: INFO
      KC_HEALTH_ENABLED: true
      KC_HTTP_MANAGEMENT_PORT: 9000
    command:
      - start-dev
      - --import-realm
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  postgres_data:
    name: koiki_v07_unified_postgres_data
  keycloak_data:
    name: koiki_v07_unified_keycloak_data
