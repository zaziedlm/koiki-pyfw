name: CI Pipeline

on:
  push:
    branches: [main, dev/v0.7, support/0.6, topic/*, feature/*]
  pull_request:
    branches: [main, dev/v0.7, support/0.6]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
      ENV_FILE: .env.ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13.13"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Verify uv lockfile consistency
        run: |
          uv lock --check

      - name: Install dependencies
        run: |
          uv sync --locked --group dev --group test

      - name: Run libkoiki unit tests
        run: |
          # libkoiki 単独セッション: koiki_ref_app の ORM bootstrap と分離してマッパー汚染を防止
          uv run --locked pytest --cov=libkoiki --cov-report= \
            components/libkoiki/tests/ \
            tests/unit/agent_guidance/

      - name: Run koiki_ref_app and integration tests with coverage
        run: |
          # 別セッション: bootstrap_orm() が UserModel.sso_links を安全に追加できる
          # db_integration は Docker / 手動確認向けに分離し、標準CIから除外する
          uv run --locked pytest --cov=koiki_ref_app --cov=libkoiki --cov-append \
            --cov-report=term-missing --cov-report=html \
            -m "not db_integration" \
            components/koiki_ref_app/tests/ \
            tests/integration/services/
          uv tree --locked

      - name: Upload HTML coverage report (optional)
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: html-coverage-report
          path: htmlcov
