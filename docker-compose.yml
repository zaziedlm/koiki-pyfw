# docker-compose.yml
name: koiki_v07

services:
  db:
    image: postgres:15
    container_name: koiki_v07_postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ${ENV_FILE:-.env} # 環境変数を参照
    ports:
      - "5432:5432" # ローカルで直接DBに接続したい場合
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    # PostgreSQLのパフォーマンス設定
    command:
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=256MB"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: koiki_v07_backend
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_started
    env_file:
      - ${ENV_FILE:-.env}
    ports:
      - "8000:8000"
    command: uvicorn koiki_ref_app.asgi:app --host 0.0.0.0 --port 8000 # 本番設定（リロードなし）
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    container_name: koiki_v07_frontend
    depends_on:
      - app
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.docker
    environment:
      # Override for browser-accessible API calls
      - NEXT_PUBLIC_API_BASE_URL=http://app:8000/api/v1
      - NEXT_PUBLIC_API_PREFIX=/api/v1
      - NEXT_PUBLIC_API_URL=http://app:8000
      - NODE_ENV=production
    restart: always
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  keycloak:
    image: quay.io/keycloak/keycloak:26.3.5
    container_name: koiki_v07_keycloak
    command: [ "start-dev", "--import-realm" ]
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      - KC_HEALTH_ENABLED=true
      - KC_METRICS_ENABLED=true
    volumes:
      - ./docker/keycloak/realm-koiki.json:/opt/keycloak/data/import/realm-koiki.json:ro
      - ./docker/keycloak/realm-saml.json:/opt/keycloak/data/import/realm-saml.json:ro
      - keycloak_data:/opt/keycloak/data
    ports:
      - "8090:8080"
      - "9000:9000" # Management port for health checks
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

volumes:
  postgres_data:
    name: koiki_v07_postgres_data
  keycloak_data:
    name: koiki_v07_keycloak_data
